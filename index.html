if (!window.storage) {
  window.storage = {
    async get(k){ const v = localStorage.getItem("naku:"+k); return v == null ? null : { key: k, value: v }; },
    async set(k, v){ localStorage.setItem("naku:"+k, v); return { key: k, value: v }; },
    async delete(k){ localStorage.removeItem("naku:"+k); return { key: k, deleted: true }; },
    async list(prefix){ const keys=[]; for (let i=0;i<localStorage.length;i++){ const kk=localStorage.key(i); if (kk.startsWith("naku:")&&(!prefix||kk.slice(5).startsWith(prefix))) keys.push(kk.slice(5)); } return { keys }; },
  };
}
